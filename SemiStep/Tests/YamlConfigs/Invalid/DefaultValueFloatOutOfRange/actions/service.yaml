# Invalid: step_duration default_value 100000 exceeds time property max (86400)
10:
  ui_name: "Wait"
  deploy_duration: longlasting
  columns:
    - key: step_duration
      default_value: "100000"
      property_type_id: time
    - key: comment
      property_type_id: string

20:
  ui_name: "For"
  deploy_duration: immediate
  columns:
    - key: task
      default_value: "1"
      property_type_id: float
    - key: comment
      property_type_id: string

30:
  ui_name: "EndFor"
  deploy_duration: immediate
  columns:
    - key: comment
      property_type_id: string

40:
  ui_name: "Pause"
  deploy_duration: immediate
  columns:
    - key: comment
      property_type_id: string

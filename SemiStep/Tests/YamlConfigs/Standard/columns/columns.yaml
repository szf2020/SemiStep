# Minimal column definitions for testing

action:
  column_type: action_combo_box
  ui:
    ui_name: "Action"
  business_logic:
    property_type_id: enum
    plc_data_type: int
    read_only: false
    save_to_csv: true

step_duration:
  column_type: property_field
  ui:
    ui_name: "Duration"
  business_logic:
    property_type_id: time
    plc_data_type: float
    read_only: false
    save_to_csv: true

task:
  column_type: property_field
  ui:
    ui_name: "Task"
  business_logic:
    property_type_id: float
    plc_data_type: float
    read_only: false
    save_to_csv: true

comment:
  column_type: text_field
  ui:
    ui_name: "Comment"
  business_logic:
    property_type_id: string
    plc_data_type: none
    save_to_csv: true
    read_only: false

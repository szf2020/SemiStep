# Valid properties with extra unknown fields
int:
  system_type: int
  format_kind: numeric
  units: ""
  unknown_extra_field: "should be ignored"

float:
  system_type: float
  format_kind: numeric
  units: ""
  some_noise: 42

string:
  system_type: string
  format_kind: numeric
  units: ""
  max_length: 255

enum:
  system_type: int
  format_kind: numeric
  units: ""

time:
  system_type: float
  format_kind: time_hms
  units: "s"
  min: 0
  max: 86400
  extra_key: true

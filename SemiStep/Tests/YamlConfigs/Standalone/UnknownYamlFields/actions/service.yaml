# Valid actions with extra unknown fields
10:
  ui_name: "Wait"
  deploy_duration: longlasting
  unknown_action_field: "noise"
  columns:
    - key: step_duration
      default_value: "10"
      property_type_id: time
      extra_column_field: true
    - key: comment
      property_type_id: string

20:
  ui_name: "For"
  deploy_duration: immediate
  columns:
    - key: task
      default_value: "1"
      property_type_id: float
    - key: comment
      property_type_id: string

30:
  ui_name: "EndFor"
  deploy_duration: immediate
  columns:
    - key: comment
      property_type_id: string

40:
  ui_name: "Pause"
  deploy_duration: immediate
  columns:
    - key: comment
      property_type_id: string

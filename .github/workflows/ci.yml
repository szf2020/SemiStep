name: ci

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/ci.yml"
      - "SemiStep/**"
      - "ConfigFiles/**"
      - "global.json"
      - "!**.md"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "SemiStep/**"
      - "ConfigFiles/**"
      - "global.json"
      - "!**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: restore
        run: dotnet restore SemiStep/SemiStep.slnx

      - name: build
        run: dotnet build SemiStep/SemiStep.slnx -c Release --no-restore

      - name: test
        run: dotnet test SemiStep/Tests/Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: verify formatting
        run: dotnet format SemiStep/SemiStep.slnx --verify-no-changes
